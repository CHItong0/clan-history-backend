server:
  port: 8080

spring:
  application:
    name: clan-history-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/clan_history?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: 5836833

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  secret: clan-history-jwt-secret-key-2024-very-long-and-secure-key-for-production
  expiration: 86400000
  header: Authorization
  prefix: Bearer

logging:
  level:
    com.clanhistory: DEBUG
    org.springframework.security: DEBUG
